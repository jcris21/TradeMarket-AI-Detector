openapi: 3.0.0
info:
  title: LTI (Learning Technology Initiative) API
  description: |
    REST API for the Learning Technology Initiative platform, designed for managing candidates, positions, interviews, and recruitment processes.
    
    This API follows Domain-Driven Design principles and implements a layered architecture for scalable recruitment management.
    
    ## Features
    - Candidate management with education and work experience tracking
    - Position management with company and interview flow integration
    - Application tracking through interview processes
    - File upload capabilities for resumes and documents
    - Comprehensive filtering, sorting, and pagination support
    
  version: 0.0.0.001
  contact:
    name: LTI Development Team
  license:
    name: ISC
    
servers:
  - url: http://localhost:3000
    description: Development server
  - url: https://api.lti.dev
    description: Production server

paths:
  /candidates:
    get:
      summary: Get all candidates
      description: Retrieve a paginated list of candidates with optional filtering and sorting capabilities
      tags:
        - Candidates
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
            default: 1
          description: Page number for pagination
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
          description: Number of candidates per page
        - in: query
          name: search
          schema:
            type: string
          description: Search term to filter candidates by first name, last name, or email
        - in: query
          name: sort
          schema:
            type: string
            enum: [firstName, lastName, email]
            default: firstName
          description: Field to sort candidates by
        - in: query
          name: order
          schema:
            type: string
            enum: [asc, desc]
            default: asc
          description: Sort order
      responses:
        '200':
          description: Successfully retrieved candidates
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CandidateListResponse'
        '400':
          description: Invalid request parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    
    post:
      summary: Create a new candidate
      description: Add a new candidate to the system with their personal information, education, and work experience
      tags:
        - Candidates
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCandidateRequest'
      responses:
        '201':
          description: Candidate created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateCandidateResponse'
        '400':
          description: Validation error or email already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /candidates/{id}:
    get:
      summary: Get candidate by ID
      description: Retrieve detailed information about a specific candidate including their applications, interviews, and related data
      tags:
        - Candidates
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: Candidate ID
      responses:
        '200':
          description: Successfully retrieved candidate
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CandidateDetails'
        '400':
          description: Invalid ID format
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Candidate not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    
    put:
      summary: Update candidate interview stage
      description: Update the current interview stage for a candidate's application
      tags:
        - Candidates
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: Candidate ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCandidateStageRequest'
      responses:
        '200':
          description: Candidate stage updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdateCandidateStageResponse'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Application not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /positions:
    get:
      summary: Get all positions
      description: Retrieve all visible positions in the system
      tags:
        - Positions
      responses:
        '200':
          description: Successfully retrieved positions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Position'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /positions/{id}:
    get:
      summary: Get position by ID
      description: Retrieve detailed information about a specific position
      tags:
        - Positions
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: Position ID
      responses:
        '200':
          description: Successfully retrieved position
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Position'
        '400':
          description: Invalid position ID format
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Position not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    
    put:
      summary: Update position
      description: |
        Update an existing position with new information. Supports partial updates - only fields provided in the request body will be updated.
        Fields not provided will maintain their existing values in the database.
      tags:
        - Positions
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: Position ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePositionRequest'
      responses:
        '200':
          description: Position updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpdatePositionResponse'
        '400':
          description: Validation error or invalid reference data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Position not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /positions/{id}/candidates:
    get:
      summary: Get candidates by position
      description: Retrieve all candidates who have applied to a specific position with their interview progress
      tags:
        - Positions
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: Position ID
      responses:
        '200':
          description: Successfully retrieved candidates for position
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/PositionCandidate'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /positions/{id}/candidates/names:
    get:
      summary: Get candidate names by position
      description: Retrieve simplified candidate information (ID and name only) for a specific position
      tags:
        - Positions
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: Position ID
      responses:
        '200':
          description: Successfully retrieved candidate names
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/CandidateName'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /positions/{id}/interviewflow:
    get:
      summary: Get interview flow by position
      description: Retrieve the interview flow configuration for a specific position
      tags:
        - Positions
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: integer
          description: Position ID
      responses:
        '200':
          description: Successfully retrieved interview flow
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InterviewFlowResponse'
        '404':
          description: Position not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /upload:
    post:
      summary: Upload file
      description: Upload a file (PDF or DOCX) for resume or document storage
      tags:
        - File Upload
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  type: string
                  format: binary
                  description: File to upload (PDF or DOCX, max 10MB)
              required:
                - file
      responses:
        '200':
          description: File uploaded successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/FileUploadResponse'
        '400':
          description: Invalid file type or file too large
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Upload error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    CandidateListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Candidate'
        metadata:
          $ref: '#/components/schemas/PaginationMetadata'
      required:
        - data
        - metadata

    Candidate:
      type: object
      properties:
        id:
          type: integer
          description: Unique candidate identifier
        firstName:
          type: string
          description: Candidate's first name
        lastName:
          type: string
          description: Candidate's last name
        email:
          type: string
          format: email
          description: Candidate's email address
        phone:
          type: string
          nullable: true
          description: Candidate's phone number
        address:
          type: string
          nullable: true
          description: Candidate's address
        educations:
          type: array
          items:
            $ref: '#/components/schemas/Education'
        workExperiences:
          type: array
          items:
            $ref: '#/components/schemas/WorkExperience'
        resumes:
          type: array
          items:
            $ref: '#/components/schemas/Resume'
        applications:
          type: array
          items:
            $ref: '#/components/schemas/Application'
      required:
        - firstName
        - lastName
        - email

    CandidateDetails:
      allOf:
        - $ref: '#/components/schemas/Candidate'
        - type: object
          properties:
            applications:
              type: array
              items:
                allOf:
                  - $ref: '#/components/schemas/Application'
                  - type: object
                    properties:
                      position:
                        type: object
                        properties:
                          id:
                            type: integer
                          title:
                            type: string
                      interviews:
                        type: array
                        items:
                          $ref: '#/components/schemas/Interview'

    CreateCandidateRequest:
      type: object
      properties:
        firstName:
          type: string
          description: Candidate's first name
        lastName:
          type: string
          description: Candidate's last name
        email:
          type: string
          format: email
          description: Candidate's email address
        phone:
          type: string
          nullable: true
          description: Candidate's phone number
        address:
          type: string
          nullable: true
          description: Candidate's address
        educations:
          type: array
          items:
            $ref: '#/components/schemas/CreateEducationRequest'
        workExperiences:
          type: array
          items:
            $ref: '#/components/schemas/CreateWorkExperienceRequest'
        cv:
          $ref: '#/components/schemas/CreateResumeRequest'
      required:
        - firstName
        - lastName
        - email

    CreateCandidateResponse:
      type: object
      properties:
        id:
          type: integer
          description: Created candidate ID
        firstName:
          type: string
        lastName:
          type: string
        email:
          type: string
        phone:
          type: string
          nullable: true
        address:
          type: string
          nullable: true
      required:
        - id
        - firstName
        - lastName
        - email

    UpdateCandidateStageRequest:
      type: object
      properties:
        applicationId:
          type: string
          description: Application ID (will be converted to integer)
        currentInterviewStep:
          type: string
          description: Current interview step (will be converted to integer)
      required:
        - applicationId
        - currentInterviewStep

    UpdateCandidateStageResponse:
      type: object
      properties:
        message:
          type: string
          example: "Candidate stage updated successfully"
        data:
          $ref: '#/components/schemas/Application'

    Position:
      type: object
      properties:
        id:
          type: integer
          description: Position unique identifier
        companyId:
          type: integer
          description: Associated company ID
        interviewFlowId:
          type: integer
          description: Associated interview flow ID
        title:
          type: string
          description: Position title
        description:
          type: string
          description: Position description
        status:
          type: string
          description: Position status
          default: "Draft"
        isVisible:
          type: boolean
          description: Whether position is visible to candidates
          default: false
        location:
          type: string
          description: Position location
        jobDescription:
          type: string
          description: Detailed job description
        requirements:
          type: string
          nullable: true
          description: Position requirements
        responsibilities:
          type: string
          nullable: true
          description: Position responsibilities
        salaryMin:
          type: number
          nullable: true
          description: Minimum salary
        salaryMax:
          type: number
          nullable: true
          description: Maximum salary
        employmentType:
          type: string
          nullable: true
          description: Type of employment
        benefits:
          type: string
          nullable: true
          description: Position benefits
        companyDescription:
          type: string
          nullable: true
          description: Company description
        applicationDeadline:
          type: string
          format: date-time
          nullable: true
          description: Application deadline
        contactInfo:
          type: string
          nullable: true
          description: Contact information
      required:
        - companyId
        - interviewFlowId
        - title
        - description
        - location
        - jobDescription

    UpdatePositionRequest:
      type: object
      properties:
        companyId:
          type: integer
          minimum: 1
          description: Associated company ID (must be a positive integer)
        interviewFlowId:
          type: integer
          minimum: 1
          description: Associated interview flow ID (must be a positive integer)
        title:
          type: string
          maxLength: 100
          minLength: 1
          description: Position title (required, 1-100 characters)
        description:
          type: string
          minLength: 1
          description: Position description (required, cannot be empty)
        status:
          type: string
          enum: [Open, Contratado, Cerrado, Borrador]
          description: Position status (must be one of the valid status values)
        isVisible:
          type: boolean
          description: Whether position is visible to candidates
        location:
          type: string
          minLength: 1
          description: Position location (required, cannot be empty)
        jobDescription:
          type: string
          minLength: 1
          description: Detailed job description (required, cannot be empty)
        requirements:
          type: string
          nullable: true
          description: Position requirements
        responsibilities:
          type: string
          nullable: true
          description: Position responsibilities
        salaryMin:
          type: number
          minimum: 0
          nullable: true
          description: Minimum salary (must be >= 0, cannot be greater than salaryMax)
        salaryMax:
          type: number
          minimum: 0
          nullable: true
          description: Maximum salary (must be >= 0, cannot be less than salaryMin)
        employmentType:
          type: string
          nullable: true
          description: Type of employment
        benefits:
          type: string
          nullable: true
          description: Position benefits
        companyDescription:
          type: string
          nullable: true
          description: Company description
        applicationDeadline:
          type: string
          format: date-time
          nullable: true
          description: Application deadline (must be a future date)
        contactInfo:
          type: string
          nullable: true
          description: Contact information

    UpdatePositionResponse:
      type: object
      properties:
        message:
          type: string
          example: "Position updated successfully"
        data:
          $ref: '#/components/schemas/Position'

    PositionCandidate:
      type: object
      properties:
        fullName:
          type: string
          description: Candidate's full name
        currentInterviewStep:
          type: string
          description: Current interview step name
        candidateId:
          type: integer
          description: Candidate ID
        applicationId:
          type: integer
          description: Application ID
        averageScore:
          type: number
          description: Average interview score
      required:
        - fullName
        - currentInterviewStep
        - candidateId
        - applicationId
        - averageScore

    CandidateName:
      type: object
      properties:
        candidateId:
          type: integer
          description: Candidate ID
        fullName:
          type: string
          description: Candidate's full name
      required:
        - candidateId
        - fullName

    InterviewFlowResponse:
      type: object
      properties:
        interviewFlow:
          type: object
          properties:
            positionName:
              type: string
              description: Position title
            interviewFlow:
              $ref: '#/components/schemas/InterviewFlow'

    InterviewFlow:
      type: object
      properties:
        id:
          type: integer
          description: Interview flow ID
        description:
          type: string
          description: Interview flow description
        interviewSteps:
          type: array
          items:
            $ref: '#/components/schemas/InterviewStep'

    InterviewStep:
      type: object
      properties:
        id:
          type: integer
          description: Interview step ID
        interviewFlowId:
          type: integer
          description: Associated interview flow ID
        interviewTypeId:
          type: integer
          description: Associated interview type ID
        name:
          type: string
          description: Interview step name
        orderIndex:
          type: integer
          description: Step order in the interview flow

    Education:
      type: object
      properties:
        id:
          type: integer
          description: Education record ID
        candidateId:
          type: integer
          description: Associated candidate ID
        institution:
          type: string
          description: Educational institution name
        title:
          type: string
          description: Degree or certification title
        startDate:
          type: string
          format: date-time
          description: Education start date
        endDate:
          type: string
          format: date-time
          nullable: true
          description: Education end date
      required:
        - institution
        - title
        - startDate

    CreateEducationRequest:
      type: object
      properties:
        institution:
          type: string
          description: Educational institution name
        title:
          type: string
          description: Degree or certification title
        startDate:
          type: string
          format: date-time
          description: Education start date
        endDate:
          type: string
          format: date-time
          nullable: true
          description: Education end date
      required:
        - institution
        - title
        - startDate

    WorkExperience:
      type: object
      properties:
        id:
          type: integer
          description: Work experience record ID
        candidateId:
          type: integer
          description: Associated candidate ID
        company:
          type: string
          description: Company name
        position:
          type: string
          description: Job position title
        description:
          type: string
          nullable: true
          description: Job description
        startDate:
          type: string
          format: date-time
          description: Employment start date
        endDate:
          type: string
          format: date-time
          nullable: true
          description: Employment end date
      required:
        - company
        - position
        - startDate

    CreateWorkExperienceRequest:
      type: object
      properties:
        company:
          type: string
          description: Company name
        position:
          type: string
          description: Job position title
        description:
          type: string
          nullable: true
          description: Job description
        startDate:
          type: string
          format: date-time
          description: Employment start date
        endDate:
          type: string
          format: date-time
          nullable: true
          description: Employment end date
      required:
        - company
        - position
        - startDate

    Resume:
      type: object
      properties:
        id:
          type: integer
          description: Resume record ID
        candidateId:
          type: integer
          description: Associated candidate ID
        filePath:
          type: string
          description: Resume file path
        fileType:
          type: string
          description: Resume file MIME type
      required:
        - filePath
        - fileType

    CreateResumeRequest:
      type: object
      properties:
        filePath:
          type: string
          description: Resume file path
        fileType:
          type: string
          description: Resume file MIME type
      required:
        - filePath
        - fileType

    Application:
      type: object
      properties:
        id:
          type: integer
          description: Application ID
        candidateId:
          type: integer
          description: Associated candidate ID
        positionId:
          type: integer
          description: Associated position ID
        applicationDate:
          type: string
          format: date-time
          description: Application submission date
        currentInterviewStep:
          type: integer
          description: Current interview step ID
        notes:
          type: string
          nullable: true
          description: Application notes

    Interview:
      type: object
      properties:
        interviewDate:
          type: string
          format: date-time
          description: Interview date and time
        interviewStep:
          type: object
          properties:
            name:
              type: string
              description: Interview step name
        notes:
          type: string
          nullable: true
          description: Interview notes
        score:
          type: number
          nullable: true
          description: Interview score

    FileUploadResponse:
      type: object
      properties:
        filePath:
          type: string
          description: Uploaded file path
        fileType:
          type: string
          description: Uploaded file MIME type
      required:
        - filePath
        - fileType

    PaginationMetadata:
      type: object
      properties:
        total:
          type: integer
          description: Total number of records
        page:
          type: integer
          description: Current page number
        limit:
          type: integer
          description: Records per page
        totalPages:
          type: integer
          description: Total number of pages
      required:
        - total
        - page
        - limit
        - totalPages

    ErrorResponse:
      type: object
      properties:
        message:
          type: string
          description: Error message
        error:
          type: string
          description: Detailed error information
      required:
        - message

tags:
  - name: Candidates
    description: Operations related to candidate management
  - name: Positions
    description: Operations related to job position management
  - name: File Upload
    description: Operations related to file uploads

# ── FinAlly: Analysis endpoints ──────────────────────────────────────────────
# GET /api/analysis/latest
# Returns the most recent analysis run results plus run-level metadata.
#
# Response shape:
#   results       array    — ordered by rank; each item is AssetAnalysisWithFreshness (see below)
#   run_metadata  object | null
#     run_id              string  — UUID of the most recent run
#     analyzed_at         string  — ISO 8601 UTC timestamp of run completion
#     duration_seconds    number  — wall-clock time of the full pipeline in seconds
#     total_tickers       integer — total tickers submitted to Stage 1
#     successful_tickers  integer — tickers that passed Stage-1 validation
#     (null when no run has been recorded, e.g. on a fresh install with only seed data)
#
# Response shape per result item (AssetAnalysisWithFreshness):
#   ticker              string   — e.g. "AAPL"
#   signal              string   — "BUY" | "WAIT" | "AVOID"
#   confidence          number
#   entry_price         number
#   target_price        number
#   stop_loss           number
#   risk_reward_ratio   number
#   support_validated   boolean
#   score               number | null
#   rank                integer | null
#   analyzed_at         string   — ISO 8601 UTC timestamp
#   freshness_status    string   — "fresh" | "active" | "aged" | "expired"
#                                  fresh   : age_hours < 2
#                                  active  : 2 <= age_hours < 5
#                                  aged    : 5 <= age_hours < 24
#                                  expired : age_hours >= 24
#   freshness_age_hours number   — elapsed hours since analyzed_at, rounded to 2dp
#
# GET /api/analysis/{ticker}
# Same shape as above for a single ticker's latest result.
#
# GET /api/analysis/performance
# Returns aggregated outcome performance metrics derived from analysis_results.
#
# Response shape (PerformanceSummary):
#   total_signals   integer — total resolved signals (outcome IS NOT NULL)
#   target_hits     integer — count of TARGET_HIT outcomes
#   stop_hits       integer — count of STOP_HIT outcomes
#   expired         integer — count of EXPIRED outcomes
#   orphaned_count  integer — signals with outcome IS NULL and analyzed_at > 35 days ago
#   hit_ratio       number  — target_hits / (target_hits + stop_hits); 0.0 when no conclusive outcomes
#   profit_factor   number | null — total_gains / total_losses; null when total_losses = 0 and gains > 0
#
# ── Two-layer score fields (US-301) ──────────────────────────────────────────
# Added to AssetAnalysisWithFreshness (GET /api/analysis/latest, GET /api/analysis/{ticker}):
#
#   score_quant       number | null — pure quantitative score 0–100 (8-component formula,
#                                     no LLM input). Canonical ranking key; replaces `score`
#                                     as the sort field. Equals `score` for backward compat.
#   score_legacy      number | null — original LLM-confidence weighted score 0–100, kept
#                                     in parallel for 30-day A/B comparison, then dropped.
#   enrichment_delta  number | null — optional ±15-pt adjustment applied post-hoc via the
#                                     enrich endpoint (see below). NULL during/after batch
#                                     runs; never re-sorts the ranking list.
#   score_enriched    number | null — derived: score_quant + enrichment_delta. Computed at
#                                     read time, not stored. NULL when enrichment_delta is NULL.
#
# NOTE for back-test scripts: read `score_quant` (not `score`) as the canonical ranking
# field. `score` remains for backward compat but is now an alias for `score_quant`.
#
# POST /api/analysis/{ticker}/enrich
# Apply a post-hoc enrichment_delta to a ticker's score within a specific run.
# Intended for visual-enrichment workflows (e.g., VisionAgent) that compute a
# confidence score after the batch run completes.
#
# Request body:
#   run_id  string  — UUID of the run containing the target row (required)
#   delta   number  — adjustment in [-15, +15] (required; 422 if out of range)
#
# Response (200 OK):
#   ticker           string         — uppercased ticker symbol
#   run_id           string         — run UUID from request
#   enrichment_delta number         — stored delta value
#   score_enriched   number | null  — score_quant + enrichment_delta; null if score_quant missing
#
# Errors:
#   422 — delta out of [-15, +15] range
#   404 — no analysis_results row matching (ticker, run_id)
